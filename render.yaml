# Render blueprint — שני שירותים: web (FastAPI + Telegram webhook) ו-worker (Collector + Dispatcher).
# בשלב 1 ה-worker רץ כשלד ריק; ימולא משלב 2 ואילך.

services:
  - type: web
    name: api-watch-web
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: TIMEZONE
        value: Asia/Jerusalem
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_WEBHOOK_BASE_URL
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: apiwatch
      - key: GEMINI_API_KEY
        sync: false

  - type: worker
    name: api-watch-worker
    runtime: python
    plan: standard
    region: frankfurt
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python -m worker
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: TIMEZONE
        value: Asia/Jerusalem
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: apiwatch
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
